#####################################
### THIS IS FOR DEVELOPMENT ONLY! ###
### DO NOT RUN THIS IN PRODUCTION ###
#####################################

services:
  postgres:
    image: 'postgres:alpine'
    ports:
      - '127.0.0.1:5432:5432' # NEVER EXPOSE THIS PORT. YOU HAVE BEEN WARNED.
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: 'redis:alpine'
    ports:
      - '127.0.0.1:6379:6379'
  
  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    restart: unless-stopped
    volumes:
      - mailpit_data:/data
    ports:
      - '127.0.0.1:1025:1025'
      - '127.0.0.1:8025:8025'
    env_file:
      - .env
            

volumes:
  postgres_data:
  mailpit_data: